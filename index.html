<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doğu Türkistan Kermesi</title>
    <link rel="icon" href="logo-son.webp" type="image/webp">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. TEMEL AYARLAR & OLED GRAIN
           ========================================= */
        body {
            font-family: 'League Spartan', sans-serif;
            margin: 0; padding: 0; color: #333; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
            /* YENİ: Nefes alan, aydınlık ve ferah arka plan */
            background: linear-gradient(-45deg, #f8f9fa, #e3f2fd, #f8f9fa, #e0f7fa);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .oled-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99999; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* =========================================
           2. SİNEMATİK AÇILIŞ (MBHAR EDITION)
           ========================================= */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 1; 
            /* MBHAR Büyüyerek Kaybolma Geçişi */
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        /* YENİ: Roket Kalkış Efektleri */
        .rocket-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both infinite;
            filter: blur(2px) brightness(1.1);
        }
        .rocket-launch {
            transform: translateY(100vh) scale(0.9); /* İçerik aşağı düşer, biz uzaya çıkarız */
            opacity: 0; transition: all 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53);
        }
        @keyframes shake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            25% { transform: translate3d(-2px, 2px, 0); }
            50% { transform: translate3d(2px, -2px, 0); }
            75% { transform: translate3d(-2px, -2px, 0); }
        }
        /*Arama Çubuğu*/
        .search-container {
    padding: 15px 20px 0 20px; max-width: 600px; margin: 0 auto; position: relative;
}
.search-input {
    width: 100%; padding: 12px 15px 12px 40px; border-radius: 30px;
    border: 1px solid #e5e7eb; font-family: inherit; font-size: 15px;
    background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
}
.search-input:focus { outline: none; border-color: #00a3dd; }
.search-icon { position: absolute; left: 35px; top: 25px; width: 18px; height: 18px; }
.empty-msg { text-align: center; color: #6b7280; font-style: italic; grid-column: 1 / -1; padding: 20px; }
        
        /* 0.3s: Logo Belirir */
        .splash-logo-wrapper {
            position: relative; overflow: hidden; border-radius: 50%; 
            opacity: 0; animation: fadeIn 0.8s ease forwards 0.3s;
        }
        .splash-logo { width: 140px; height: 140px; object-fit: contain; display: block; }
        
        /* 1.2s: SADECE Logonun Üzerinden Yavaşça Geçen Işık */
        .splash-logo-wrapper::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg);
            animation: logoGlare 1.8s ease-in-out forwards 1.2s; /* MBHAR Yavaşlığı */
        }

        /* 0.6s: Ana Başlık Belirir (Alt alta ve Metalik Font) */
        .splash-title {
            font-family: 'Roboto', sans-serif;
            font-weight: 900;
            font-size: 26px;
            letter-spacing: 4px;
            line-height: 1.4;
            margin: 30px 0 10px 0;
            text-align: center;
            /* MBHAR Metalik Efekti */
            background: linear-gradient(90deg, #888, #ffffff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; animation: fadeIn 0.8s ease forwards 0.6s;
        }

        /* 0.9s: Tarih Belirir (Courier New Sadeliği) */
        .splash-date {
            font-family: 'Courier New', monospace;
            color: #666666; font-size: 14px; letter-spacing: 4px; margin: 0;
            opacity: 0; animation: fadeIn 0.8s ease forwards 0.9s;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes logoGlare { 0% { left: -100%; } 100% { left: 200%; } }

        /* =========================================
           3. ANA ARAYÜZ (APP CONTENT)
           ========================================= */
        #app-content { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .blur-out { filter: blur(8px) brightness(0.8); transform: scale(0.98); }
        .cover-image { width: 100%; display: block; object-fit: cover; }

        .tabs {
            display: flex; justify-content: center; background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
        .tab-btn {
            flex: 1; padding: 15px 0; border: none; background: none; font-family: inherit;
            font-size: 16px; font-weight: 600; color: #9ca3af; cursor: pointer;
            border-bottom: 3px solid transparent; transition: all 0.3s;
        }
        .tab-btn.active { color: #00a3dd; border-bottom: 3px solid #00a3dd; }

        .menu-container {
            padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            max-width: 600px; margin: 0 auto;
        }
        
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.7s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .product-card {
           background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            text-align: center; display: flex; flex-direction: column; justify-content: space-between;
        }
        .product-img {
            width: 100%; aspect-ratio: 1/1; background-color: #e5e7eb; border-radius: 8px;
            margin-bottom: 10px; display: flex; align-items: center; justify-content: center;
            color: #9ca3af; font-size: 12px; overflow: hidden;
        }
        
        .product-img img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 8px;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .product-name { font-weight: 700; font-size: 16px; margin: 5px 0; }
        .product-price { color: #00a3dd; font-weight: 600; margin-bottom: 12px; }

        /* YENİ: Liquid Stepper (Tomurcuklanma) Fizikleri */
        .btn-group {
            display: flex; align-items: center; justify-content: flex-end; width: 100%; position: relative;
        }
        
        .minus-btn {
            background-color: #ef4444; color: white; border: none; height: 43px;
            border-radius: 6px; font-weight: bold; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            /* BAŞLANGIÇTA GİZLİ VE ANA BUTONUN İÇİNDE SAKLI */
            width: 0; opacity: 0; margin-right: 0; padding: 0;
            transform: scale(0.5) translateX(30px);
            pointer-events: none; /* Gizliyken hayalet gibidir, tıklanmaz */
            /* İŞTE O SİHİRLİ APPLE YAY FİZİĞİ */
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .minus-btn.active {
            /* TOMURCUKLANIP DIŞARI FIRLAMIŞ HALİ */
            width: 45px; opacity: 1; margin-right: 8px;
            transform: scale(1) translateX(0);
            pointer-events: auto;
        }
        .minus-btn:active { transform: scale(0.85); transition: 0.1s; }

        .add-btn {
            background-color: #00a3dd; color: white; border: none; height: 43px;
            border-radius: 6px; font-family: inherit; font-weight: 600; font-size: 15px;
            cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center;
            /* Yeşile dönüş ve tıklama esnemesi */
            transition: background-color 0.4s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .add-btn.added { background-color: #10b981; }
        .add-btn:active { transform: scale(0.95); transition: 0.1s; }
        
        .cart-section {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
        .total-text { font-size: 22px; font-weight: 700; margin-bottom: 15px; color: #111; }
        
        .iban-box {
            background: #f3f4f6; padding: 15px; border-radius: 8px; margin-bottom: 15px;
            font-size: 16px; letter-spacing: 0.5px; font-weight: 600;
        }
        
        .copy-buttons-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .copy-btn {
            flex: 1; background-color: #4b5563; color: white; border: none; padding: 12px 10px;
            border-radius: 6px; font-family: inherit; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: background-color 0.2s;
        }
        .copy-btn:active { background-color: #374151; }

        .complete-btn {
            background-color: #00a3dd; color: white; border: none; padding: 15px 20px;
            border-radius: 6px; font-family: inherit; font-weight: 700; font-size: 18px;
            cursor: pointer; width: 100%; box-shadow: 0 4px 10px rgba(0, 163, 221, 0.3);
        }
        .insta-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: calc(100% - 40px); max-width: 560px; margin: 0 auto 20px auto;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white; text-align: center; padding: 15px 20px; border-radius: 6px;
            font-family: inherit; font-weight: 700; font-size: 15px; line-height: 1.4; text-decoration: none;
            box-shadow: 0 4px 10px rgba(220, 39, 67, 0.3); transition: transform 0.2s; box-sizing: border-box;
        }
.insta-btn:active { transform: scale(0.95); }
        .signature {
            text-align: center; padding: 20px; color: #6b7280; font-size: 15px;
            font-weight: 600; opacity: 0.8; letter-spacing: 0.5px;
        }

        #toast {
            visibility: hidden; min-width: 250px; background-color: #10b981; color: #fff;
            text-align: center; border-radius: 8px; padding: 15px; position: fixed;
            z-index: 999; left: 50%; top: -100px; transform: translateX(-50%);
            font-weight: 600; box-shadow: 0 4px 15px rgba(16,185,129,0.4);
            transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #toast.show { visibility: visible; top: 30px; }

        /* =========================================
           4. SİNEMATİK FİNAL & DUA KARTI
           ========================================= */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease-out;
        }

        #thank-you-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #0d1d31 0%, #0c0d13 100%);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .stars {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 200px 200px;
            animation: starsMove 10s linear infinite; opacity: 0.5;
        }
        @keyframes starsMove { from { background-position: 0 0; } to { background-position: -200px 200px; } }
        
        .final-card {
            width: 85%; max-width: 400px; aspect-ratio: 9/16; background-color: transparent;
            border-radius: 15px; box-shadow: 0 0 50px rgba(255,255,255,0.15);
            transform: scale(0.8); transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; z-index: 2; overflow: hidden;
        }
        .final-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: none; z-index: 3; pointer-events: none;
        }
        .final-card.scale-up { transform: scale(1); }
        .final-card.scale-up::after { animation: glareSweep 2.5s ease-in-out forwards; animation-delay: 0.5s; }
        @keyframes glareSweep { 0% { left: -100%; } 100% { left: 200%; } }
       

        /* YENİ: İndirme Yazısı */
        .download-hint {
            margin-top: 25px; color: rgba(255,255,255,0.5); font-family: 'League Spartan', sans-serif;
            font-size: 14px; letter-spacing: 1px; opacity: 0; transition: opacity 1.5s ease; z-index: 5;
        }
        .download-hint.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="oled-grain"></div>

    <div id="splash-screen">
        <div class="splash-logo-wrapper">
            <img src="logo-son.webp" alt="CTFSOS Logo" class="splash-logo">
        </div>
        <h1 class="splash-title">
            <span>DOĞU TÜRKİSTAN</span><br>
            <span>KERMESİ</span>
        </h1>
        <p class="splash-date">06.05.2026</p>
    </div>

    <div id="flash-overlay"></div>

    <div id="app-content">
        <img src="kapak-son.webp" class="cover-image" alt="Kermes Afişi">

        <div class="tabs">
            <button class="tab-btn active" onclick="changeTab('yiyecek')">YİYECEKLER</button>
            <button class="tab-btn" onclick="changeTab('icecek')">İÇECEKLER</button>
            <button class="tab-btn" onclick="changeTab('diger')">DİĞER ÜRÜNLER</button>
        </div>
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#00a3dd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Arama..." oninput="handleSearch(this.value)">
        </div>
        <div class="menu-container" id="menu-container"></div>

        <div class="cart-section">
            <div class="total-text">Toplam Bağış Tutarınız: <span id="total-price">0</span> TL</div>
            
            <div class="iban-box" id="iban-text">TR54 0000 0000 0000 0000 0000 00</div>
            <div style="font-weight: bold; margin-bottom: 15px; font-size: 20px;">Melih Baha Harman</div>
            
            
            <div class="copy-buttons-row">
                <button class="copy-btn" onclick="copyText('TR54 0000 0000 0000 0000 0000 00', 'IBAN')">IBAN Kopyala</button>
                <button class="copy-btn" onclick="copyText('Melih Baha Harman', 'Ad Soyad')">Ad Soyad Kopyala</button>
            </div>

            <button class="complete-btn" onclick="completeDonation()">Bağışımı Tamamladım</button>
        </div>
    <a href="https://instagram.com/ctfsos" target="_blank" class="insta-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        <span>Bizi Instagram'dan Takip Etmeyi<br>Unutmayın :)</span>
    </a>
        <div class="signature">Sevgiyle ve Umutla Tasarlandı - MBH</div>
    </div>

    <div id="toast">Kopyalandı! Ödeme ekranınıza yapıştırabilirsiniz.</div>

    <div id="thank-you-screen">
        <div class="stars"></div>
        <div class="final-card" id="final-card">
            <img src="kart-son.webp" style="width: 100%; height: 100%; object-fit: cover; border-radius: 15px;" alt="Teşekkür Kartı">
        </div>
        <div class="download-hint" id="download-hint">Basılı tutarak görseli indirebilirsiniz.</div>
    </div>

    <script>
        const products = {
            yiyecek: [
                { id: "y1", name: "Islak Kek", price: 40, img: "" },
                { id: "y2", name: "Patatesli Poğaça", price: 20, img: "" },
                { id: "y3", name: "Yaprak Sarma", price: 50, img: "" },
                { id: "y4", name: "Makarna Salatası", price: 35, img: "" },
                { id: "y5", name: "Kısır", price: 40, img: "" },
                { id: "y6", name: "Su Böreği", price: 45, img: "" },
                { id: "y7", name: "Ev Baklavası", price: 60, img: "" },
                { id: "y8", name: "Zeytinyağlı Enginar", price: 55, img: "" },
                { id: "y9", name: "Mercimek Köftesi", price: 30, img: "" },
                { id: "y10", name: "Çikolatalı Kurabiye", price: 25, img: "" },
                { id: "y11", name: "Peynirli Gözleme", price: 40, img: "" },
                { id: "y12", name: "Elmalı Turta", price: 35, img: "" }
            ],
            icecek: [
                { id: "i1", name: "Turanyum Gazozu", price: 25, img: "" },
                { id: "i2", name: "Limonata", price: 30, img: "" },
                { id: "i3", name: "Çay", price: 10, img: "" },
                { id: "i4", name: "Su", price: 5, img: "" }
            ],
            diger: [
                { id: "d1", name: "Mineli Rozet", price: 60, img: "" },
                { id: "d2", name: "Tıp Sticker Seti", price: 30, img: "" },
                { id: "d3", name: "Taha Kılınç Kitabı", price: 100, img: "" },
                { id: "d4", name: "Nöbet Kahvesi", price: 45, img: "" }
            ]
        };

        let cartTotal = 0;
        let cartCounts = {};
        let currentCategory = 'yiyecek';
        let searchTerm = '';

        function handleSearch(term) {
          searchTerm = term.toLowerCase();
         renderMenu(currentCategory);
}

        // YENİ: Splash Screen MBHAR Zoom-Out ve Sıfır Bekleme Senaryosu
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.1)'; // MBHAR büyüyerek kaybolma
                setTimeout(() => { splash.style.display = 'none'; }, 800);
            }, 3000); // 1.2s bekleme + 1.8s ışık süresi = tam 3.0 saniyede bitiş, bekleme yok!
        });

        function renderMenu(category) {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            // 1. Arama Filtresi Motoru
            let targetProducts = [];
            
            // Eğer arama çubuğu boşsa, sadece seçili olan kategoriyi (sekme) göster
            if (searchTerm === '') {
                targetProducts = products[category];
            } else {
                // Arama yapıldıysa TÜM kategorileri bir sepete at ve orada ara
                const allProducts = [...products.yiyecek, ...products.icecek, ...products.diger];
                targetProducts = allProducts.filter(product => 
                    product.name.toLowerCase().includes(searchTerm)
                );
            }

            // (Bu satırın hemen altında "if (targetProducts.length === 0)" kısmı devam edecek. Artık filteredProducts yerine targetProducts yazdığımız için altındaki kodlarda yer alan 2 adet filteredProducts kelimesini de targetProducts olarak değiştirmen gerekecek.)

            // Eğer aranan ürün yoksa mesaj göster
            if (targetProducts.length === 0) {
                container.innerHTML = '<div class="empty-msg">Aramanızla eşleşen ürün bulamadık :(</div>';
                return;
            }

            // 2. Filtrelenmiş Ürünleri Ekrana Bas
            targetProducts.forEach(product => {
                let count = cartCounts[product.id] || 0;
                let btnText = count > 0 ? count + " Eklendi ✓" : "EKLE";
                let btnClass = count > 0 ? "add-btn added" : "add-btn";
                let minusActiveClass = count > 0 ? "active" : ""; // Hücre bölünmüş mü?

                let imgContent = product.img !== "" 
                    ? `<img src='${product.img}' alt='${product.name}'>` 
                    : "Kare Fotoğraf";

                const card = `
                    <div class="product-card reveal">
                        <div class="product-img">${imgContent}</div>
                        <div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">${product.price} TL</div>
                            <div class="btn-group">
                                <button class="minus-btn ${minusActiveClass}" onclick="removeFromCart('${product.id}', ${product.price}, this)">-</button>
                                <button class="${btnClass}" onclick="addToCart('${product.id}', ${product.price}, this)">${btnText}</button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
            observeScroll();
        }

        function observeScroll() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        function changeTab(category) {
            currentCategory = category;
            if (navigator.vibrate) navigator.vibrate(20);
            // YENİ: Sekme değiştiğinde arama çubuğunu otomatik temizle
            document.getElementById('searchInput').value = '';
            searchTerm = '';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderMenu(category);
        }

        function addToCart(id, price, btnElement) {
            cartTotal += price;
            document.getElementById('total-price').innerText = cartTotal;

            if(!cartCounts[id]) cartCounts[id] = 0;
            cartCounts[id]++;

            // 1. Canlı Buton Güncellemesi (Maviden Yeşile)
            btnElement.innerText = cartCounts[id] + " Eklendi ✓";
            btnElement.classList.add('added');
            
            // 2. TOMURCUKLANMA! (Eğer ilk defa ekleniyorsa, fırlat!)
            const btnGroup = btnElement.parentElement;
            const minusBtn = btnGroup.querySelector('.minus-btn');
            if (cartCounts[id] === 1) {
                minusBtn.classList.add('active'); // Sola doğru sıvı bir yaylanmayla çıkar
            }

            // 3. Fotoğraf kalp atışı
            const imgContainer = btnElement.closest('.product-card').querySelector('.product-img img');
            if(imgContainer) {
                imgContainer.style.transform = 'scale(0.85)';
                setTimeout(() => { imgContainer.style.transform = 'scale(1)'; }, 200);
            }
            
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
        }

        function removeFromCart(id, price, minusBtnElement) {
            if (!cartCounts[id] || cartCounts[id] <= 0) return; 
            
            cartCounts[id]--;
            cartTotal -= price;
            document.getElementById('total-price').innerText = cartTotal;
            
            if (navigator.vibrate) navigator.vibrate(20);

            const btnGroup = minusBtnElement.parentElement;
            const addBtnElement = btnGroup.querySelector('.add-btn');

            if (cartCounts[id] === 0) {
                // GERİ EMİLME! (Sıfırlandıysa damla tekrar içeri girer ve buton mavi olur)
                minusBtnElement.classList.remove('active'); 
                addBtnElement.innerText = "EKLE";
                addBtnElement.classList.remove('added'); 
            } else {
                addBtnElement.innerText = cartCounts[id] + " Eklendi ✓";
            }
        }
        
        function copyText(textToCopy, type) {
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            navigator.clipboard.writeText(textToCopy).then(() => {
                const toast = document.getElementById("toast");
                toast.innerText = type + " kopyalandı! Ödeme ekranınıza yapıştırabilirsiniz.";
                toast.classList.add("show");
                setTimeout(() => { toast.classList.remove("show"); }, 3000);
            });
        }

function completeDonation() {
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
            if(cartTotal === 0) { alert("Lütfen önce menüden ürün seçiniz."); return; }
            
            const appContent = document.getElementById('app-content');
            const flash = document.getElementById('flash-overlay');
            
            // 1. Motorlar ateşleniyor (Titreme ve Gerilme)
            appContent.classList.add('rocket-shake');
            
            setTimeout(() => {
                // 2. Kalkış! (Fırlama ve Flaş)
                appContent.classList.remove('rocket-shake');
                appContent.classList.add('rocket-launch');
                flash.style.opacity = '1';
                
                setTimeout(() => {
                    appContent.style.display = 'none';
                    appContent.classList.remove('rocket-launch'); // Temizlik
                    
                    const thankYouScreen = document.getElementById('thank-you-screen');
                    thankYouScreen.style.display = 'flex';
                    thankYouScreen.style.opacity = '1';
                    
                    flash.style.opacity = '0';
                    
                    setTimeout(() => {
                        document.getElementById('final-card').classList.add('scale-up');
                        setTimeout(() => {
                            document.getElementById('download-hint').classList.add('show');
                        }, 1200);
                    }, 100);

                }, 400); // Kalkış hızı
            }, 350); // Titreme süresi
        }

        window.onload = () => renderMenu('yiyecek');
    </script>
</body>
</html>
